<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Generar iconos ZenFlow</title>
  <style>
    body { font-family: system-ui; background: #080818; color: #f1f5f9; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; gap: 24px; }
    h2 { font-size: 1.4rem; color: #a855f7; }
    p  { color: #94a3b8; font-size: 0.9rem; }
    button { padding: 14px 32px; background: linear-gradient(135deg,#7c3aed,#3b82f6); color: white; border: none; border-radius: 12px; font-size: 1rem; cursor: pointer; }
    canvas { display: none; }
    .links { display: flex; gap: 16px; }
    a { color: #7c3aed; }
  </style>
</head>
<body>
  <h2>🔔 Generador de iconos ZenFlow</h2>
  <p>Haz clic para generar y descargar los iconos PNG necesarios para la PWA.</p>
  <button onclick="generate()">Generar y descargar iconos</button>
  <div class="links" id="links"></div>
  <canvas id="c"></canvas>

  <script>
    function drawIcon(ctx, size) {
      const cx = size / 2, cy = size / 2;
      const r = size * 0.42;

      // Fondo
      const bgGrad = ctx.createRadialGradient(cx, cy, 0, cx, cy, size * 0.7);
      bgGrad.addColorStop(0, '#1a0a2e');
      bgGrad.addColorStop(1, '#080818');
      ctx.fillStyle = bgGrad;
      roundRect(ctx, 0, 0, size, size, size * 0.23);
      ctx.fill();

      // Glow
      const glow = ctx.createRadialGradient(cx, cy, 0, cx, cy, r * 1.4);
      glow.addColorStop(0, 'rgba(124,58,237,0.5)');
      glow.addColorStop(1, 'rgba(124,58,237,0)');
      ctx.fillStyle = glow;
      ctx.beginPath();
      ctx.arc(cx, cy, r * 1.4, 0, Math.PI * 2);
      ctx.fill();

      // Anillos
      [r * 1.3, r, r * 0.72].forEach((rad, i) => {
        ctx.beginPath();
        ctx.arc(cx, cy, rad, 0, Math.PI * 2);
        ctx.strokeStyle = `rgba(124,58,237,${0.45 - i * 0.1})`;
        ctx.lineWidth = size * 0.006;
        ctx.stroke();
      });

      // Pétalos
      for (let p = 0; p < 8; p++) {
        ctx.save();
        ctx.translate(cx, cy);
        ctx.rotate((p / 8) * Math.PI * 2);
        ctx.beginPath();
        ctx.ellipse(r * 0.5, 0, r * 0.5, r * 0.18, 0, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(${p % 2 === 0 ? '124,58,237' : '168,85,247'},${p % 2 === 0 ? 0.35 : 0.28})`;
        ctx.fill();
        ctx.restore();
      }

      // Cruz
      ctx.strokeStyle = 'rgba(245,166,35,0.25)';
      ctx.lineWidth = size * 0.003;
      ctx.beginPath(); ctx.moveTo(cx, cy - r * 1.3); ctx.lineTo(cx, cy + r * 1.3); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(cx - r * 1.3, cy); ctx.lineTo(cx + r * 1.3, cy); ctx.stroke();

      // Puntos cardinales
      [[cx, cy - r * 1.3],[cx + r * 1.3, cy],[cx, cy + r * 1.3],[cx - r * 1.3, cy]].forEach(([x,y],i) => {
        ctx.beginPath();
        ctx.arc(x, y, size * 0.018, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(245,166,35,${i%2===0?0.9:0.6})`;
        ctx.fill();
      });

      // Centro
      const cGrad = ctx.createRadialGradient(cx, cy, 0, cx, cy, r * 0.2);
      cGrad.addColorStop(0, 'rgba(245,166,35,0.9)');
      cGrad.addColorStop(1, 'rgba(124,58,237,0.6)');
      ctx.beginPath();
      ctx.arc(cx, cy, r * 0.25, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(124,58,237,0.5)';
      ctx.strokeStyle = 'rgba(245,166,35,0.7)';
      ctx.lineWidth = size * 0.005;
      ctx.fill();
      ctx.stroke();

      ctx.beginPath();
      ctx.arc(cx, cy, r * 0.12, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(245,166,35,0.9)';
      ctx.fill();

      ctx.beginPath();
      ctx.arc(cx, cy, r * 0.05, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(255,255,255,0.95)';
      ctx.fill();
    }

    function roundRect(ctx, x, y, w, h, r) {
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.lineTo(x + w - r, y);
      ctx.quadraticCurveTo(x + w, y, x + w, y + r);
      ctx.lineTo(x + w, y + h - r);
      ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
      ctx.lineTo(x + r, y + h);
      ctx.quadraticCurveTo(x, y + h, x, y + h - r);
      ctx.lineTo(x, y + r);
      ctx.quadraticCurveTo(x, y, x + r, y);
      ctx.closePath();
    }

    function generate() {
      const canvas = document.getElementById('c');
      const linksEl = document.getElementById('links');
      linksEl.innerHTML = '';
      [192, 512].forEach(size => {
        canvas.width = size;
        canvas.height = size;
        const ctx = canvas.getContext('2d');
        drawIcon(ctx, size);
        const link = document.createElement('a');
        link.download = `icon-${size}.png`;
        link.href = canvas.toDataURL('image/png');
        link.textContent = `⬇ Descargar icon-${size}.png`;
        link.style.padding = '10px 20px';
        link.style.background = 'rgba(124,58,237,0.2)';
        link.style.borderRadius = '8px';
        link.click();
        linksEl.appendChild(link);
      });
    }
  </script>
</body>
</html>
