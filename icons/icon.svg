<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a0a2e"/>
      <stop offset="100%" stop-color="#080818"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Fondo -->
  <rect width="512" height="512" rx="120" fill="url(#bg)"/>
  <rect width="512" height="512" rx="120" fill="url(#glow)"/>

  <!-- Anillos exteriores -->
  <circle cx="256" cy="256" r="200" fill="none" stroke="rgba(124,58,237,0.4)" stroke-width="3"/>
  <circle cx="256" cy="256" r="155" fill="none" stroke="rgba(124,58,237,0.25)" stroke-width="2"/>
  <circle cx="256" cy="256" r="110" fill="none" stroke="rgba(245,166,35,0.3)" stroke-width="1.5"/>

  <!-- Pétalos de mandala -->
  <g transform="translate(256,256)">
    <ellipse rx="95" ry="38" fill="rgba(124,58,237,0.3)" transform="rotate(0)"/>
    <ellipse rx="95" ry="38" fill="rgba(124,58,237,0.25)" transform="rotate(45)"/>
    <ellipse rx="95" ry="38" fill="rgba(124,58,237,0.3)" transform="rotate(90)"/>
    <ellipse rx="95" ry="38" fill="rgba(124,58,237,0.25)" transform="rotate(135)"/>
    <ellipse rx="75" ry="28" fill="rgba(168,85,247,0.4)" transform="rotate(22.5)"/>
    <ellipse rx="75" ry="28" fill="rgba(168,85,247,0.35)" transform="rotate(67.5)"/>
    <ellipse rx="75" ry="28" fill="rgba(168,85,247,0.4)" transform="rotate(112.5)"/>
    <ellipse rx="75" ry="28" fill="rgba(168,85,247,0.35)" transform="rotate(157.5)"/>
  </g>

  <!-- Cruz cardinal -->
  <line x1="256" y1="80" x2="256" y2="432" stroke="rgba(245,166,35,0.25)" stroke-width="1.5"/>
  <line x1="80" y1="256" x2="432" y2="256" stroke="rgba(245,166,35,0.25)" stroke-width="1.5"/>

  <!-- Puntos cardinales -->
  <circle cx="256" cy="80"  r="5" fill="rgba(245,166,35,0.8)"/>
  <circle cx="432" cy="256" r="5" fill="rgba(245,166,35,0.6)"/>
  <circle cx="256" cy="432" r="5" fill="rgba(245,166,35,0.8)"/>
  <circle cx="80"  cy="256" r="5" fill="rgba(245,166,35,0.6)"/>

  <!-- Centro -->
  <circle cx="256" cy="256" r="42" fill="rgba(124,58,237,0.5)" stroke="rgba(245,166,35,0.6)" stroke-width="2"/>
  <circle cx="256" cy="256" r="20" fill="rgba(245,166,35,0.8)"/>
  <circle cx="256" cy="256" r="8"  fill="white" opacity="0.9"/>
</svg>
